<header class="site-header" id="site-header">
  <div class="header-inner">

    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>

    <a href="{{ '/' | relative_url }}" class="site-logo">
      CC-<em>SHOP</em>
    </a>

    <nav class="site-nav" id="site-nav">
      <a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">Home</a>
      <a href="{{ '/pages/shop.html' | relative_url }}" class="nav-link{% if page.url contains '/shop' %} active{% endif %}">Shop</a>
      <a href="{{ '/pages/shop.html#digital' | relative_url }}" class="nav-link">Digital</a>
      <a href="{{ '/pages/shop.html#physical' | relative_url }}" class="nav-link">Gifts</a>
    </nav>

    <div class="header-actions">
      <a href="{{ '/pages/cart.html' | relative_url }}" class="cart-btn" aria-label="Cart">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span class="cart-count" id="cart-count">0</span>
      </a>
    </div>

  </div>
</header>
